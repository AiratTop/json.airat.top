  <body>
    <div class="backdrop">
      <header class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true">json</div>
          <div>
            <h1>JSON Formatter & Validator</h1>
            <p>Private, fast, and fully local.</p>
          </div>
        </div>
        <div class="controls" role="group" aria-label="JSON controls">
          <button class="btn" id="formatBtn" type="button">Format</button>
          <button class="btn btn--ghost" id="minifyBtn" type="button">Minify</button>
          <button class="btn btn--ghost" id="sortBtn" type="button">Sort Keys</button>
          <button class="btn btn--ghost" id="jsonToYamlBtn" type="button">
            JSON<span class="btn__arrow" aria-hidden="true">→</span>YAML
          </button>
          <button class="btn btn--ghost" id="yamlToJsonBtn" type="button">
            YAML<span class="btn__arrow" aria-hidden="true">→</span>JSON
          </button>
          <button class="btn btn--ghost" id="copyBtn" type="button">Copy</button>
          <button class="btn btn--ghost" id="downloadBtn" type="button">Download</button>
          <button class="btn btn--ghost" id="resetBtn" type="button">Reset</button>
          <label class="toggle">
            <input id="darkMode" type="checkbox" />
            <span>Dark Mode</span>
          </label>
          <a
            class="repo"
            href="https://github.com/AiratTop/json.airat.top"
            target="_blank"
            rel="noreferrer noopener"
          >
            GitHub
          </a>
        </div>
      </header>

      <main class="split" id="splitPane">
        <section class="pane">
          <div class="pane__header pane__header--between">
            <span>Input</span>
            <span class="pane__meta">JSON or YAML</span>
          </div>
          <textarea
            id="inputArea"
            spellcheck="false"
            aria-label="JSON or YAML input"
          ></textarea>
        </section>
        <div
          class="divider"
          id="dragHandle"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize panels"
        ></div>
        <section class="pane">
          <div class="pane__header pane__header--between">
            <span>Output</span>
            <span class="pane__meta" id="outputMeta">Ready</span>
          </div>
          <textarea
            id="outputArea"
            spellcheck="false"
            aria-label="Formatted output"
            readonly
          ></textarea>
        </section>
      </main>

      <div class="error" id="errorBox" aria-live="polite"></div>
      <div class="status" id="status" aria-live="polite"></div>

      <footer class="doc-footer">
        <p>
          © 2026
          <a href="https://airat.top" target="_blank" rel="author">Airat.Top</a>
          |
          <a href="https://github.com/AiratTop/json.airat.top" target="_blank" rel="noreferrer">GitHub</a>
          |
          <a href="https://privacy.airat.top" target="_blank" rel="noreferrer privacy-policy">Privacy</a>
          |
          <a href="https://terms.airat.top" target="_blank" rel="noreferrer terms-of-service">Terms</a>
        </p>
      </footer>
    </div>

    <script src="vendor/js-yaml.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
